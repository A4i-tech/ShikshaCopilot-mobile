name: sikshana
description: "Shiksha copilot Flutter Application."
publish_to: "none"
version: 1.0.0+1
environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_easyloading: ^3.0.5
  flutter_screenutil: ^5.9.3
  get: ^4.7.2
  flutter_form_builder: ^10.2.0
  flutter_svg: ^2.0.10+1
  intl: ^0.20.2
  permission_handler: ^12.0.1
  connectivity_plus: ^6.1.5
  pretty_dio_logger: ^1.4.0
  printing: ^5.14.2
  url_launcher: ^6.3.2
  logger: ^2.6.1
  package_info_plus: ^8.3.1
  internet_connection_checker: ^3.0.1
  lottie: ^3.3.0
  cached_network_svg_image: ^1.2.0
  pin_code_fields: ^8.0.1
  fl_chart: ^1.1.1
  table_calendar: ^3.2.0
  image_picker: ^1.2.0
  get_storage: ^2.1.1
  cached_network_image: ^3.4.1
  dropdown_search: ^6.0.2
  flutter_markdown: ^0.7.7+1
  webview_flutter: ^4.13.1
  pdf: ^3.11.3
  path_provider: ^2.1.0
  speech_to_text: ^7.3.0
  app_settings: ^6.1.1
  youtube_player_flutter: ^9.1.3
  chewie: ^1.13.0
  photo_view: ^0.15.0
  upgrader: ^12.3.0
  shimmer: ^3.0.0
  share_plus: ^12.0.1
  tutorial_coach_mark: ^1.3.3
  open_file_manager: ^2.0.1
  docx_creator: ^1.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/shiksha_copilot_appicon.png"
  remove_alpha_ios: true

# The following section is specific to Flutter packages.
flutter:
  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/svg_images/
    - assets/lottie/
    - assets/locales/
    - assets/template/
    - assets/fonts/

fonts:
  - family: Lato
    fonts:
      - asset: assets/fonts/Lato-Hairline.ttf
        weight: 100
      - asset: assets/fonts/Lato-Thin.ttf
        weight: 200
      - asset: assets/fonts/Lato-Light.ttf
        weight: 300
      - asset: assets/fonts/Lato-Regular.ttf
        weight: 400
      - asset: assets/fonts/Lato-Medium.ttf
        weight: 500
      - asset: assets/fonts/Lato-Semibold.ttf
        weight: 600
      - asset: assets/fonts/Lato-Bold.ttf
        weight: 700
      - asset: assets/fonts/Lato-Heavy.ttf
        weight: 800
      - asset: assets/fonts/Lato-Black.ttf
        weight: 900

  - family: NotoKannada
    fonts:
      - asset: assets/fonts/NotoSansKannada-Regular.ttf
        weight: 400

      - asset: assets/fonts/NotoSansKannada-Bold.ttf    
        weight: 700
    
  - family: NotoTelugu
    fonts:
      - asset: assets/fonts/NotoSansTelugu-Regular.ttf
        weight: 400  
